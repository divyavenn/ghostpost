version: '3.9'
services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_APP_BACKEND_ADDRESS=http://backend:8000

  backend:
    build: ./backend
    # Not exposed publicly - only accessible via nginx
    user: "1000:1000"
    volumes:
      - ./backend/cache:/app/backend/cache
    env_file:
      - ./backend/.env