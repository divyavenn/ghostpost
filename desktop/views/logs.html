<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Floodme Logs</title>
    <style>
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
        }
        .container {
            max-width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #fff;
            font-size: 18px;
        }
        .controls {
            margin-bottom: 15px;
        }
        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 12px;
        }
        button:hover {
            background-color: #1177bb;
        }
        #logContent {
            background-color: #252526;
            padding: 15px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }
        .log-line {
            margin-bottom: 2px;
        }
        .log-info { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-success { color: #b5cea8; }
        .log-warning { color: #ce9178; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Floodme Desktop Logs</h1>

        <div class="controls">
            <button onclick="refreshLogs()">Refresh</button>
            <button onclick="clearLogs()">Clear</button>
            <button onclick="copyLogs()">Copy to Clipboard</button>
        </div>

        <div id="logContent">Loading logs...</div>
    </div>

    <script>
        const { getRecentLogs, getLogFilePath } = require('../src/logger');
        const fs = require('fs');

        function refreshLogs() {
            const logs = getRecentLogs(200);
            const logContent = document.getElementById('logContent');

            if (!logs) {
                logContent.textContent = 'No logs available';
                return;
            }

            // Colorize logs
            const lines = logs.split('\n');
            logContent.innerHTML = lines.map(line => {
                let className = '';
                if (line.includes('[INFO]')) className = 'log-info';
                else if (line.includes('[ERROR]')) className = 'log-error';
                else if (line.includes('[SUCCESS]')) className = 'log-success';
                else if (line.includes('[WARNING]')) className = 'log-warning';

                return `<div class="log-line ${className}">${escapeHtml(line)}</div>`;
            }).join('');

            // Scroll to bottom
            logContent.scrollTop = logContent.scrollHeight;
        }

        function clearLogs() {
            if (confirm('Are you sure you want to clear all logs?')) {
                const logFile = getLogFilePath();
                try {
                    fs.writeFileSync(logFile, '');
                    refreshLogs();
                } catch (error) {
                    alert('Failed to clear logs: ' + error.message);
                }
            }
        }

        function copyLogs() {
            const logs = getRecentLogs(200);
            navigator.clipboard.writeText(logs).then(() => {
                alert('Logs copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy logs: ' + err);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load logs on startup
        window.addEventListener('DOMContentLoaded', refreshLogs);

        // Auto-refresh every 5 seconds
        setInterval(refreshLogs, 5000);
    </script>
</body>
</html>
