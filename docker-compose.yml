
services:
  frontend:
    build:
      context: ./frontend
      # Don't set VITE_API_BASE_URL - use relative URLs to go through nginx
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"  # Backend API
    # Removed user restriction - container runs as user defined in Dockerfile
    # This works on all platforms (Mac/Windows/Linux)
    volumes:
      - ./backend/cache:/app/cache
    env_file:
      - ./backend/.env
    depends_on:
      - cache-init
    environment:
      - DISPLAY=:99  # For local scraping with Xvfb

  cache-init:
    image: alpine:latest
    user: "0:0"  # Run as root to fix permissions
    volumes:
      - ./backend/cache:/app/cache
    command: >
      sh -c "
        mkdir -p /app/cache &&
        chown -R 1000:1000 /app/cache &&
        chmod -R 755 /app/cache
      "