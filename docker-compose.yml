version: '3.9'
services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_APP_BACKEND_ADDRESS=http://backend:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"  # Expose for local testing
    user: "1000:1000"
    volumes:
      - ./backend/cache:/app/cache
    env_file:
      - ./backend/.env
    depends_on:
      - cache-init

  cache-init:
    image: alpine:latest
    user: "0:0"  # Run as root to fix permissions
    volumes:
      - ./backend/cache:/app/cache
    command: >
      sh -c "
        mkdir -p /app/cache &&
        chown -R 1000:1000 /app/cache &&
        chmod -R 755 /app/cache
      "