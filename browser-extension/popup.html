<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Twitter Cookie Sync</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #1da1f2;
    }
    .setting {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      color: #333;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1da1f2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 8px;
    }
    button:hover {
      background: #1a8cd8;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      margin-top: 12px;
      padding: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>🔄 Twitter Cookie Sync</h2>

  <div class="setting">
    <label for="username">Twitter Username:</label>
    <input type="text" id="username" placeholder="your_twitter_handle" />
  </div>

  <button id="saveBtn">Save Settings</button>
  <button id="syncBtn">Sync Now</button>

  <div id="status"></div>

  <div class="info">
    <strong>How it works:</strong><br>
    • Automatically syncs cookies when you log into Twitter<br>
    • Syncs every 5 minutes while browser is open<br>
    • Click "Sync Now" to force an immediate sync
  </div>

  <script src="popup.js"></script>
</body>
</html>
